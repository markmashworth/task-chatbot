name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  service:
    name: Service — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-chatbot-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: task-chatbot-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  ui:
    name: UI — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-chatbot-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: task-chatbot-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  ui-e2e:
    name: UI — E2E tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-chatbot-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: task-chatbot-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
